blueprint:
  name: "IKEA Bilresa Scrollwheel - Light Control"
  author: "thetestspecimen"
  source_url: "https://github.com/thetestspecimen/homeassistant/blob/main/blueprints/ikea-bilresa-scroll-wheel.yaml"
  description: |
    
    Light controller for the IKEA Bilresa Smart Scroll Wheel via Matter.
    (Cannot be used with the 2-Button Remote!)
    
    VARIABLES:
    - 3 Scroll Zones: Choose the function (Brightness, Kelvin, RGB, Presets).
    - 3 Buttons x 2 Gestures: Choose a specific action for EACH gesture (double click / hold).

    Note: single click will always turn the light on or off (toggle).
    
    REQUIREMENTS:

    For optimal behavior, the following settings must be applied:
    - ENABLE Events: 3,6,9 (in section "Events")
    - ENABLE Sensors: 1,2,4,5,7,8 (in section "Diagnostic")
    - DISABLE Events: 1,2,4,5,7,8 (in section "Events")
    - DISABLE Sensors: 3,6,9 (in section "Diagnostic")
    
    HELPER GROUP:

    If controlling multiple lights, please always use a HELPER GROUP!
    Directly controlling multiple entities can cause sync issues.
    
  domain: automation

  # ==========================================================
  # 0. GLOBAL LIGHT
  # ==========================================================
  input:
    # --- ENTITY MAPPING ---
    header_0:
      name: "Entity Mapping [REQUIRED]"
      description: "Select the entities for the scroll wheel and buttons"
      default: ""
      selector:
        constant:
          value: ""

    group_buttons:
      name: "Buttons"
      icon: "mdi:gesture-tap"
      collapsed: true
      input:
        event_button_1:
          name: "Channel 1: Button"
          description: "Event: Look for 'Button (3)'"
          selector: { entity: { domain: event, integration: matter } }
        event_button_2:
          name: "Channel 2: Button"
          description: "Event: Look for 'Button (6)'"
          selector: { entity: { domain: event, integration: matter } }
        event_button_3:
          name: "Channel 3: Button"
          description: "Event: Look for 'Button (9)'"
          selector: { entity: { domain: event, integration: matter } }

    group_scroll_wheel:
      name: "Scroll Wheel"
      icon: "mdi:rotate-right"
      collapsed: true
      input:
        sensor_1:
          name: "Channel 1: Scroll forwards"
          description: "Sensor: Look for 'Current switch position (1)'"
          selector: { entity: { domain: sensor, integration: matter } }
        sensor_2:
          name: "Channel 1: Scroll backwards"
          description: "Sensor: Look for 'Current switch position (2)'"
          selector: { entity: { domain: sensor, integration: matter } }
        sensor_4:
          name: "Channel 2: Scroll forwards"
          description: "Sensor: Look for 'Current switch position (4)'"
          selector: { entity: { domain: sensor, integration: matter } }
        sensor_5:
          name: "Channel 2: Scroll backwards"
          description: "Sensor: Look for 'Current switch position (5)'"
          selector: { entity: { domain: sensor, integration: matter } }
        sensor_7:
          name: "Channel 3: Scroll forwards"
          description: "Sensor: Look for 'Current switch position (7)'"
          selector: { entity: { domain: sensor, integration: matter } }
        sensor_8:
          name: "Channel 3: Scroll backwards"
          description: "Sensor: Look for 'Current switch position (8)'"
          selector: { entity: { domain: sensor, integration: matter } }

    header_00:
      name: "Default Light"
      default: ""
      selector:
        constant:
          value: ""
    
    global_light:
      name: Global Light - Default [REQUIRED]
      description: This light will be used for any zone or button that does not have a specific override light set below.
      selector: { entity: { domain: light } }

    # --- CHANNEL 1 ---
    header_1:
      name: "Channel 1"
      default: ""
      selector:
        constant:
          value: ""

    group_scroll_1:
      name: "Scroll Wheel Settings"
      icon: "mdi:rotate-right"
      collapsed: true
      input:
        light_z1:
          name: Light (Scroll Zone 1) - Optional Override
          default: ""
          selector: { entity: { domain: light } }
        scroll_logic_1_2:
          name: "Scroll Zone 1 (Sensors 1 & 2)"
          default: "brightness"
          selector: &scroll_options
            select:
              options:
                - label: "Brightness (Bright / Dark)"
                  value: "brightness"
                - label: "Kelvin (Cool / Warm)"
                  value: "kelvin"
                - label: "RGB Colour (Rainbow)"
                  value: "rgb"
                - label: "Presets (Work / Cozy)"
                  value: "preset"

    group_button_1:
      name: "Button Settings"
      icon: "mdi:gesture-tap"
      collapsed: true
      input:
        light_b1:
          name: Light (Button 1) - Optional Override
          default: ""
          selector: { entity: { domain: light } }
        btn1_double_bright:
          name: "Button 1: Double Click Brightness (%)"
          default: 80
          selector: { number: { min: 1, max: 100 } }
        btn1_double_temp:
          name: "Button 1: Double Click Colour Temp (K)"
          default: 4000
          selector: { number: { min: 2000, max: 6500 } }
        btn1_hold_bright:
          name: "Button 1: Hold Brightness (%)"
          default: 20
          selector: { number: { min: 1, max: 100 } }
        btn1_hold_temp:
          name: "Button 1: Hold Colour Temp (K)"
          default: 2200
          selector: { number: { min: 2000, max: 6500 } }

    # --- CHANNEL 2 ---
    header_2:
      name: "Channel 2"
      default: ""
      selector:
        constant:
          value: ""

    group_scroll_2:
      name: "Scroll Wheel Settings"
      icon: "mdi:rotate-right"
      collapsed: true
      input:
        light_z2:
          name: Light (Scroll Zone 2) - Optional Override
          default: ""
          selector: { entity: { domain: light } }
        scroll_logic_4_5:
          name: "Scroll Zone 2 (Sensors 4 & 5)"
          default: "kelvin"
          selector: *scroll_options
          
    group_button_2:
      name: "Button Settings"
      icon: "mdi:gesture-tap"
      collapsed: true
      input:
        light_b2:
          name: Light (Button 2) - Optional Override
          default: ""
          selector: { entity: { domain: light } }
        btn2_double_bright:
          name: "Button 2: Double Click Brightness (%)"
          default: 80
          selector: { number: { min: 1, max: 100 } }
        btn2_double_temp:
          name: "Button 2: Double Click Colour Temp (K)"
          default: 4000
          selector: { number: { min: 2000, max: 6500 } }
        btn2_hold_bright:
          name: "Button 2: Hold Brightness (%)"
          default: 20
          selector: { number: { min: 1, max: 100 } }
        btn2_hold_temp:
          name: "Button 2: Hold Colour Temp (K)"
          default: 2200
          selector: { number: { min: 2000, max: 6500 } }

    # --- CHANNEL 3 ---
    header_3:
      name: "Channel 3"
      default: ""
      selector:
        constant:
          value: ""

    group_scroll_3:
      name: "Scroll Wheel Settings"
      icon: "mdi:rotate-right"
      collapsed: true
      input:
        light_z3:
          name: Light (Scroll Zone 3) - Optional Override
          default: ""
          selector: { entity: { domain: light } }
        scroll_logic_7_8:
          name: "Scroll Zone 3 (Sensors 7 & 8)"
          default: "preset"
          selector: *scroll_options

    group_button_3:
      name: "Button Settings"
      icon: "mdi:gesture-tap"
      collapsed: true
      input:
        light_b3:
          name: Light (Button 3) - Optional Override
          default: ""
          selector: { entity: { domain: light } }
        btn3_double_bright:
          name: "Button 3: Double Click Brightness (%)"
          default: 80
          selector: { number: { min: 1, max: 100 } }
        btn3_double_temp:
          name: "Button 3: Double Click Colour Temp (K)"
          default: 4000
          selector: { number: { min: 2000, max: 6500 } }
        btn3_hold_bright:
          name: "Button 3: Hold Brightness (%)"
          default: 20
          selector: { number: { min: 1, max: 100 } }
        btn3_hold_temp:
          name: "Button 3: Hold Colour Temp (K)"
          default: 2200
          selector: { number: { min: 2000, max: 6500 } }
    
    # ---FINE TUNING---
    header_tuning:
      name: "Fine Tuning"
      default: ""
      selector:
        constant:
          value: ""

    group_step_size:
      name: "Step Sizes"
      icon: "mdi:tune"
      collapsed: true
      input:
        step_pct:
          name: "Step Size: Brightness (%)"
          default: 10
          selector: { number: { min: 1, max: 50, unit_of_measurement: "%" } }
        step_kelvin:
          name: "Step Size: Kelvin (K)"
          default: 400
          selector: { number: { min: 100, max: 1000, unit_of_measurement: "K" } }
        step_hue:
          name: "Step Size: RGB Hue (°)"
          default: 15
          selector: { number: { min: 5, max: 90, unit_of_measurement: "°" } }

    group_values:
      name: "Preset Values"
      icon: "mdi:brightness-6"
      collapsed: true
      input:
        val_bright:
          name: "Work: Brightness (%)"
          description: "The brightness value to use for the 'Work' preset"
          default: 80
          selector: { number: { min: 1, max: 100 } }
        val_cold:
          name: "Work: Colour Temperature (K)"
          description: "The colour temperature value to use for the 'Work' preset"
          default: 4000
          selector: { number: { min: 2000, max: 6500 } }
        val_dim:
          name: "Cozy: Brightness (%)"
          description: "The brightness value to use for the 'Cozy' preset"
          default: 20
          selector: { number: { min: 1, max: 100 } }
        val_warm:
          name: "Cozy: Colour Temperature (K)"
          description: "The colour temperature value to use for the 'Cozy' preset"
          default: 2200
          selector: { number: { min: 2000, max: 6500 } }

    group_transition_time:
      name: "Transition Time"
      icon: "mdi:clock"
      collapsed: true
      input:
        transition_time:
          name: "Button Transition Time (Seconds)"
          default: 0.5
          selector: { number: { min: 0.0, max: 5.0, step: 0.1 } }

mode: single
max_exceeded: silent

variables:
  global_l: !input global_light
  l_z1: !input light_z1
  l_z2: !input light_z2
  l_z3: !input light_z3
  l_b1: !input light_b1
  l_b2: !input light_b2
  l_b3: !input light_b3
  
  # Scroll Logic
  m_sc_1: !input scroll_logic_1_2
  m_sc_2: !input scroll_logic_4_5
  m_sc_3: !input scroll_logic_7_8
  
  # Atomic Button Logic
  b1_d_b: !input btn1_double_bright
  b1_d_t: !input btn1_double_temp
  b1_h_b: !input btn1_hold_bright
  b1_h_t: !input btn1_hold_temp
  b2_d_b: !input btn2_double_bright
  b2_d_t: !input btn2_double_temp
  b2_h_b: !input btn2_hold_bright
  b2_h_t: !input btn2_hold_temp
  b3_d_b: !input btn3_double_bright
  b3_d_t: !input btn3_double_temp
  b3_h_b: !input btn3_hold_bright
  b3_h_t: !input btn3_hold_temp

  # Values
  s_p: !input step_pct
  s_k: !input step_kelvin
  s_h: !input step_hue
  v_bri: !input val_bright
  v_dim: !input val_dim
  v_cold: !input val_cold
  v_warm: !input val_warm

  # Event IDs
  id_e1: !input event_button_1
  id_e2: !input event_button_2
  id_e3: !input event_button_3
  t_time: !input transition_time

triggers:
  # Scroll 1
  - trigger: state
    entity_id: !input sensor_1
    id: sc_1_up
  - trigger: state
    entity_id: !input sensor_2
    id: sc_1_down
  # Scroll 2
  - trigger: state
    entity_id: !input sensor_4
    id: sc_2_down
  - trigger: state
    entity_id: !input sensor_5
    id: sc_2_up
  # Scroll 3
  - trigger: state
    entity_id: !input sensor_7
    id: sc_3_up
  - trigger: state
    entity_id: !input sensor_8
    id: sc_3_down

  # Buttons
  - trigger: state
    entity_id: 
      - !input event_button_1
      - !input event_button_2
      - !input event_button_3
    id: btn_event

conditions:
  - condition: template
    value_template: >-
      {{ trigger.from_state is defined and trigger.to_state is defined and
         trigger.from_state.state not in ['unknown', 'unavailable'] and
         trigger.to_state.state not in ['unknown', 'unavailable'] and
         trigger.from_state.state != trigger.to_state.state }}

actions:
  # ==========================================================
  # LOGIC: SCROLLING (Fixed Direction Detection)
  # ==========================================================
  - choose:
      - conditions: "{{ 'sc_' in trigger.id }}"
        sequence:
          # Setup Logic
          - variables:
              target_light: >
                {% if 'sc_1' in trigger.id %} {{ l_z1 if l_z1 else global_l }}
                {% elif 'sc_2' in trigger.id %} {{ l_z2 if l_z2 else global_l }}
                {% elif 'sc_3' in trigger.id %} {{ l_z3 if l_z3 else global_l }}
                {% endif %}
              direction: >
                {% if '_up' in trigger.id %} 1
                {% else %} -1
                {% endif %}
              active_func: >
                {% if 'sc_1' in trigger.id %} {{ m_sc_1 }}
                {% elif 'sc_2' in trigger.id %} {{ m_sc_2 }}
                {% elif 'sc_3' in trigger.id %} {{ m_sc_3 }}
                {% endif %}
          
          # Execution
          - choose:
              - conditions: "{{ active_func == 'brightness' }}"
                sequence:
                  - action: light.turn_on
                    target: { entity_id: "{{ target_light }}" }
                    data:
                      brightness_step_pct: "{{ (s_p | float(default=10)) * direction }}"
                      transition: 0
              
              - conditions: "{{ active_func == 'kelvin' }}"
                sequence:
                  - action: light.turn_on
                    target: { entity_id: "{{ target_light }}" }
                    data:
                      color_temp_kelvin: >
                        {% set current = state_attr(target_light, 'color_temp_kelvin') | int(default=3000) %}
                        {% set step = s_k | int(default=400) %}
                        {% set min_k = state_attr(target_light, 'min_color_temp_kelvin') | int(default=2000) %}
                        {% set max_k = state_attr(target_light, 'max_color_temp_kelvin') | int(default=6500) %}
                        {% if direction == 1 %} {{ ([current + step, max_k] | min) | int }}
                        {% else %} {{ ([current - step, min_k] | max) | int }} {% endif %}
                      transition: 0
              
              - conditions: "{{ active_func == 'rgb' }}"
                sequence:
                  - action: light.turn_on
                    target: { entity_id: "{{ target_light }}" }
                    data:
                      hs_color: >
                        {% set current_hs = state_attr(target_light, 'hs_color') %}
                        {% set h = current_hs[0] | float(default=0) if current_hs is not none else 0 %}
                        {% set s = current_hs[1] | float(default=100) if current_hs is not none else 100 %}
                        {% set step = s_h | float(default=15) %}
                        {{ [(h + (step * direction)) % 360, s] }}
                      transition: 0

              - conditions: "{{ active_func == 'preset' }}"
                sequence:
                  - action: light.turn_on
                    target: { entity_id: "{{ target_light }}" }
                    data:
                      brightness_pct: "{{ v_bri if direction == 1 else v_dim }}"
                      color_temp_kelvin: "{{ v_cold if direction == 1 else v_warm }}"
                      transition: 1

  # ==========================================================
  # LOGIC: BUTTONS (ATOMIC EDITION)
  # ==========================================================
  - choose:
      - conditions: "{{ trigger.id == 'btn_event' }}"
        sequence:
          - variables:
              target_light: >
                {% if trigger.entity_id == id_e1 %} {{ l_b1 if l_b1 else global_l }}
                {% elif trigger.entity_id == id_e2 %} {{ l_b2 if l_b2 else global_l }}
                {% elif trigger.entity_id == id_e3 %} {{ l_b3 if l_b3 else global_l }}
                {% endif %}
          # --- 1. SINGLE CLICK (ALWAYS TOGGLE) ---
          - choose:
              - conditions: >
                  {{ trigger.to_state.attributes.event_type is defined and 
                     trigger.to_state.attributes.event_type == 'multi_press_1' }}
                sequence:
                  - action: light.toggle
                    target: { entity_id: "{{ target_light }}" }
                    data: { transition: "{{ t_time }}" }

          # --- 2. DOUBLE CLICK (CUSTOM) ---
          - choose:
              - conditions: >
                  {{ trigger.to_state.attributes.event_type is defined and 
                     trigger.to_state.attributes.event_type == 'multi_press_2' }}
                sequence:
                  - variables:
                      set_bri: >
                        {% if trigger.entity_id == id_e1 %} {{ b1_d_b }}
                        {% elif trigger.entity_id == id_e2 %} {{ b2_d_b }}
                        {% elif trigger.entity_id == id_e3 %} {{ b3_d_b }}
                        {% endif %}
                      set_temp: >
                        {% if trigger.entity_id == id_e1 %} {{ b1_d_t }}
                        {% elif trigger.entity_id == id_e2 %} {{ b2_d_t }}
                        {% elif trigger.entity_id == id_e3 %} {{ b3_d_t }}
                        {% endif %}
                  # Execute Action
                  - action: light.turn_on
                    target: { entity_id: "{{ target_light }}" }
                    data:
                      brightness_pct: "{{ set_bri }}"
                      color_temp_kelvin: "{{ set_temp }}"
                      transition: "{{ t_time }}"

          # --- 3. HOLD (CUSTOM) ---
          - choose:
              - conditions: >
                  {{ trigger.to_state.attributes.event_type is defined and 
                     trigger.to_state.attributes.event_type == 'long_press' }}
                sequence:
                  - variables:
                      set_bri: >
                        {% if trigger.entity_id == id_e1 %} {{ b1_h_b }}
                        {% elif trigger.entity_id == id_e2 %} {{ b2_h_b }}
                        {% elif trigger.entity_id == id_e3 %} {{ b3_h_b }}
                        {% endif %}
                      set_temp: >
                        {% if trigger.entity_id == id_e1 %} {{ b1_h_t }}
                        {% elif trigger.entity_id == id_e2 %} {{ b2_h_t }}
                        {% elif trigger.entity_id == id_e3 %} {{ b3_h_t }}
                        {% endif %}
                  # Execute Action
                  - action: light.turn_on
                    target: { entity_id: "{{ target_light }}" }
                    data:
                      brightness_pct: "{{ set_bri }}"
                      color_temp_kelvin: "{{ set_temp }}"
                      transition: "{{ t_time }}"

  # V2.0.0+ FIX: Force a 150ms dead-time only after button presses to ignore bouncing, skipping scroll events
  - choose:
      - conditions: "{{ trigger.id == 'btn_event' }}"
        sequence:
          - delay:
              milliseconds: 150